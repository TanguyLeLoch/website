<footer class="bg-ink text-paper">
  <div class="wrap grid gap-8 py-9 md:grid-cols-[1fr_auto_auto] md:items-end">
    <div class="grid gap-1.5">
      <strong class="text-base font-bold tracking-[0.02em]">{{ profileData.profile.name }}</strong>
      <span class="text-xs text-ink-faint">Freelance product engineer · Bangkok / remote</span>
    </div>

    <nav class="flex flex-wrap gap-x-8 gap-y-4" aria-label="Social links">
      <a class="footer-link" href="https://github.com/TanguyLeLoch" target="_blank" rel="noopener noreferrer">
        <lucide-angular [img]="icons.github" [size]="15" [strokeWidth]="2" aria-hidden="true" />
        GitHub
      </a>
      <a class="footer-link" href="https://www.linkedin.com/in/tanguyleloch/" target="_blank" rel="noopener noreferrer">
        <lucide-angular [img]="icons.linkedin" [size]="15" [strokeWidth]="2" aria-hidden="true" />
        LinkedIn
      </a>
      <a class="footer-link" [href]="'mailto:' + profileData.profile.email">
        <lucide-angular [img]="icons.mail" [size]="15" [strokeWidth]="2" aria-hidden="true" />
        Email
      </a>
    </nav>

    <span class="text-xs text-ink-faint">© {{ currentYear }} Tanguy Le Loch</span>
  </div>
</footer>
